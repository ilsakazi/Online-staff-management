{% extends 'dash.html' %}
{% load static %}
{% block content %}
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #007bff;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        input[type="text"] {
            width: 70%;
            padding: 8px;
            margin-right: 8px;
        }

        button {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .remove-all {
            background-color: #dc3545;
            margin-top: 10px;
        }
    </style>

<div class="container">
    <h1>Todo List</h1>

    <ul id="todoList">
    </ul>

    <div>
        <input type="text" id="newTodo" placeholder="New task...">
        <button onclick="addTodo()">Add</button>
        <button class="remove-all" onclick="removeAll()">Remove All</button>
    </div>
</div>

<script>
    function addTodo() {
        var todoInput = document.getElementById("newTodo");
        var todoList = document.getElementById("todoList");

        if (todoInput.value.trim() !== "") {
            var li = document.createElement("li");
            li.innerHTML = `
                <span>${todoInput.value}</span>
                <button onclick="removeTodo(this)">Remove</button>
            `;
            todoList.appendChild(li);
            todoInput.value = "";
        }
    }

    function removeTodo(button) {
        var li = button.parentElement;
        li.remove();
    }

    function removeAll() {
        var todoList = document.getElementById("todoList");
        todoList.innerHTML = ""; // Clear all items
    }
</script>

{% endblock %}
