<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js" integrity="sha384-Rx+T1VzGupg4BHQYs2gCW9It+akI2MM/mndMCy36UVfodzcJcF0GGLxZIzObiEfa" crossorigin="anonymous"></script>
    <title>Your Title</title>
</head>
<body>

<div class="container">
    <center>
        <img src="{% static 'lj2.png' %}" height="100px" width="400px" class="mt-3">
    </center>

    <form class="text-center mt-4">
        <label for="meeting-time"><b>Date and Time:</b></label>
        <input id="meeting-time" type="datetime-local" name="meeting-time" value="2017-06-01T08:30" class="btn btn-outline-success">
    </form>

    <table class="table table-striped mt-4">
        <thead>
            <tr>
                <th>No.</th>
                <th>Name</th>
                <th>Profile</th>
                <th>Room No</th>
                <th>Division</th>
                <th>Semester</th>
                <th>Subject</th>
            </tr>
        </thead>

        <tbody>
            {% for i in f %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.name }}</td>
                <td><img src="{{ i.image.url }}" height="100px" width="100px"></td>
                <td>{{ i.roomno }}</td>
                <td>{{ i.div }}</td>
                <td>{{ i.sem }}</td>
                <td>{{ i.subject }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
