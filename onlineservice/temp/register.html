<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous"
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js" integrity="sha384-Rx+T1VzGupg4BHQYs2gCW9It+akI2MM/mndMCy36UVfodzcJcF0GGLxZIzObiEfa" crossorigin="anonymous"></script>
    <title>Title</title>

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: transparent;
}

* {
  box-sizing: border-box;
}

/* Add padding to containers */
.container {
  padding: 16px;
  background-color: white;
}

/* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 15px;
  margin: 5px 0 22px 0;
  display: inline-block;
  border: none;
  background: #f1f1f1;
}

input[type=text]:focus, input[type=password]:focus {
  background-color: #ddd;
  outline: none;
}

/* Overwrite default styles of hr */
hr {
  border: 1px solid #f1f1f1;
  margin-bottom: 25px;
}

/* Set a style for the submit button */
.registerbtn {
  background-color: #0033aa;
  color: white;
  padding: 16px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
  opacity: 0.9;
}

.registerbtn:hover {
  opacity: 1;
}

/* Add a blue text color to links */
a {
  color: #0033aa;
}

/* Set a grey background color and center the text of the "sign in" section */
.signin {
  background-color: #f1f1f1;
  text-align: center;
}
</style>
</head>
<body>
<div class="container">
<center>
<img src="{% static 'lj2.png' %}" height="100px" width="400px">
</center>
<form method="post" action="/register/" enctype="multipart/form-data">
    {% csrf_token %}
    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger" role="alert">
     {{msg}}
    </div>

    {% endfor %}
    {% endif %}

    <div class="container">
        <h2>Register Here...!!</h2>
    <hr>
        <label for="uname"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" class="form-control" name="username" required>
    <br>
         <label for="fname"><b>First name</b></label>
    <input type="text" placeholder="Enter Firstname" class="form-control" name="first_name" required>
    <br>
        <label for="lname"><b>Last name</b></label>
    <input type="text" placeholder="Enter Lastname" class="form-control" name="last_name" required>
    <br>
        <label for="img"><b>Image</b></label>
    <input type="file" class="form-control" name="image">
    <br>
        <label for="email"><b>Email</b></label>
    <input type="email" placeholder="Enter Email Address" class="form-control" name="email" required>
    <br>
        <label for="address"><b>Address</b></label>
    <input type="address" placeholder="Enter Address" class="form-control" name="address" required>
    <br>
         <label for="psw">Password</label>
    <input type="password" placeholder="Enter Password" class="form-control" name="password" required>
    <br>
       <button type="submit" class="registerbtn">Register</button>
</div>
    <div class="container signin">
    <p>Already have an account? <a href="/Login/">Log in</a>.</p>
  </div>

</form>
</div>
</body>
</html>
